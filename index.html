<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Life</title>

<style>
body{margin:0;font-family:Arial;background:#0a0f14;color:white}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  z-index:1000;
  box-sizing:border-box;
}

.logo{color:#00ffcc;font-weight:bold}

.nav-links{display:flex}

.nav-links a{
  margin-left:20px;
  text-decoration:none;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
}

.nav-links a:hover{
  color:#00ffcc;
  border:1px solid #00ffcc;
}

/* HERO */
.hero{
  height:100vh;
  background:url("fond.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.buttons{z-index:2}

.btn{
  padding:14px 28px;
  margin:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
}

.btn:hover{
  border-color:#00ffcc;
  color:#00ffcc;
}

/* FORUM */
.forum{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

.category{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,200,0.2);
  border-radius:12px;
  margin-bottom:20px;
  padding:20px;
}

.category h2{color:#00ffcc}

.topic{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}

.topic:hover{color:#00ffcc}

/* PAGES */
.page{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  z-index:3000;
  justify-content:center;
  align-items:center;
}

/* BOX */
.auth-box{
  background:rgba(0,0,0,0.8);
  border:1px solid rgba(0,255,200,0.3);
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,255,200,0.2);
}

.auth-box h2{color:#00ffcc}

.auth-box input{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  border-radius:8px;
}

.auth-box button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:rgba(0,255,200,0.1);
  border:1px solid #00ffcc;
  color:#00ffcc;
  border-radius:8px;
  cursor:pointer;
}

.auth-box button:hover{
  background:#00ffcc;
  color:black;
}

.close-btn{
  position:absolute;
  top:20px;
  right:30px;
  font-size:25px;
  cursor:pointer;
  color:#00ffcc;
}

/* CHAT */
.post{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

/* COPY MSG */
#copyMsg{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#00ffcc;
  padding:12px 25px;
  border-radius:10px;
  display:none;
  z-index:5000;
}
</style>
</head>

<body>

<div id="copyMsg">IP TeamSpeak copiée ✔</div>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">NEXUS LIFE</div>

<div class="nav-links">
<a onclick="scrollToForum()">Forum</a>
<a onclick="openRegister()">Inscription</a>
<a onclick="openLogin()">Connexion</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="overlay"></div>
<div class="buttons">
<button class="btn">Nous rejoindre</button>
<button class="btn" onclick="copyTS()">TeamSpeak</button>
</div>
</div>

<!-- FORUM -->
<div id="forum" class="forum">

<div class="category">
<h2>📜 Informations</h2>
<div class="topic">Règlement du serveur</div>
</div>

<div class="category">
<h2>💬 Communauté</h2>
<div class="topic" onclick="openChat()">Discussions générales</div>
<div class="topic">Présentation des joueurs</div>
</div>

</div>

<!-- REGISTER -->
<div id="registerPage" class="page">
<div class="close-btn" onclick="closePage()">✖</div>
<div class="auth-box">
<h2>Inscription</h2>
<input id="pseudo" placeholder="Pseudo">
<input id="age" placeholder="Âge">
<input id="ville" placeholder="Ville">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer un compte</button>
</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page">
<div class="close-btn" onclick="closePage()">✖</div>
<div class="auth-box">
<h2>Connexion</h2>
<input id="emailLogin" placeholder="Email">
<input id="passwordLogin" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
</div>
</div>

<!-- CHAT -->
<div id="chatPage" class="page">
<div class="close-btn" onclick="closePage()">✖</div>
<div style="width:80%;max-width:800px;">
<h2 style="color:#00ffcc;">💬 Discussions générales</h2>
<div id="messages"></div>
<input id="msg">
<button onclick="sendMessage()">Envoyer</button>
</div>
</div>

<script>
function scrollToForum(){
  document.getElementById("forum").scrollIntoView({behavior:"smooth"});
}

function openRegister(){registerPage.style.display="flex"}
function openLogin(){loginPage.style.display="flex"}
function openChat(){chatPage.style.display="flex"}

function closePage(){
  registerPage.style.display="none";
  loginPage.style.display="none";
  chatPage.style.display="none";
}

function copyTS(){
  const ip="82.22.2.61";

  if(navigator.clipboard){
    navigator.clipboard.writeText(ip).then(showMsg).catch(()=>fallbackCopy(ip));
  }else{
    fallbackCopy(ip);
  }
}

function fallbackCopy(text){
  const t=document.createElement("textarea");
  t.value=text;
  document.body.appendChild(t);
  t.select();
  document.execCommand("copy");
  document.body.removeChild(t);
  showMsg();
}

function showMsg(){
  copyMsg.style.display="block";
  setTimeout(()=>copyMsg.style.display="none",2000);
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCln4tlMOg0s9CAD4QxlYNukcTCTI8ytB0",
  authDomain:"nexuslife-7a720.firebaseapp.com",
  projectId:"nexuslife-7a720"
});

const auth=getAuth();
const db=getFirestore();

let currentUser="Invité";

window.register=async()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);

  await addDoc(collection(db,"users"),{
    pseudo:pseudo.value,
    email:email.value,
    age:age.value,
    ville:ville.value
  });

  currentUser=pseudo.value;
  alert("Compte créé !");
};

window.login=async()=>{
  await signInWithEmailAndPassword(auth,emailLogin.value,passwordLogin.value);

  const snap=await getDocs(collection(db,"users"));
  snap.forEach(doc=>{
    const d=doc.data();
    if(d.email===emailLogin.value){
      currentUser=d.pseudo;
    }
  });

  alert("Connecté !");
  closePage();
};

window.sendMessage=async()=>{
  if(msg.value==="")return;

  await addDoc(collection(db,"chat"),{
    user:currentUser,
    text:msg.value
  });

  msg.value="";
};

onSnapshot(collection(db,"chat"),snap=>{
  let html="";
  snap.forEach(doc=>{
    const d=doc.data();
    html+=`<div class="post"><b>${d.user}</b><br>${d.text}</div>`;
  });
  messages.innerHTML=html;
});
</script>

</body>
</html>
