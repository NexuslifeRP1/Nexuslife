<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Life</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("fond.jpg") center/cover no-repeat;
  height:100vh;
  color:white;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.menu{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:30px;
}

.btn{
  padding:20px 30px;
  border:1px solid rgba(255,255,255,0.4);
  border-radius:12px;
  background:transparent;
  color:white;
  cursor:pointer;
  font-size:1.1rem;
  backdrop-filter:blur(5px);
  transition:0.3s;
}

.btn:hover{
  border-color:#00ffcc;
  box-shadow:0 0 20px rgba(0,255,200,0.6);
  transform:translateY(-5px);
}

#reglement{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#0b0f1a;
  color:#00ffcc;
  font-family:Courier New;
}

.arrow{
  position:absolute;
  top:20px;
  left:20px;
  font-size:30px;
  cursor:pointer;
  animation:glow 1.5s infinite;
}

@keyframes glow{
  0%{text-shadow:0 0 5px #00ffcc}
  50%{text-shadow:0 0 20px #00ffcc}
  100%{text-shadow:0 0 5px #00ffcc}
}

</style>
</head>

<body>

<div class="overlay"></div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load",()=>{
 const m=document.getElementById("bgMusic");
 m.volume=0.2;
 m.play().catch(()=>{
   document.addEventListener("click",()=>m.play(),{once:true});
 });
});
</script>

<div class="menu">
<button class="btn" onclick="openReglement()">Règlement</button>
<button class="btn">Nous rejoindre</button>
<button class="btn" onclick="window.open('https://discord.gg/FjWEc4Dh')">Discord</button>
<button class="btn" onclick="window.open('ts3server://82.22.2.61?port=9987')">TeamSpeak</button>
</div>

<div id="reglement">
<div class="arrow" onclick="closeReglement()">⬅</div>
<div style="padding:40px;overflow:auto;height:100%">
<h1>RÈGLEMENT COMPLET</h1>
<p>(ton règlement ici déjà ajouté)</p>
</div>
</div>

<script>
function openReglement(){document.getElementById('reglement').style.display='block'}
function closeReglement(){document.getElementById('reglement').style.display='none'}
</script>
