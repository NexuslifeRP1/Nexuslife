<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Life</title>

<style>
body{margin:0;font-family:Arial;background:#0a0f14;color:white}

/* NAVBAR FORUM */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  z-index:1000;
  border-bottom:1px solid rgba(0,255,200,0.2);
}

.logo{
  font-weight:bold;
  color:#00ffcc;
  letter-spacing:2px;
}

.nav-links a{
  margin:0 15px;
  text-decoration:none;
  color:white;
  transition:0.3s;
  cursor:pointer;
}

.nav-links a:hover{
  color:#00ffcc;
}

/* HERO */
.hero{
  height:100vh;
  background:url("fond.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.content{
  position:relative;
  z-index:2;
}

.btn{
  padding:14px 28px;
  margin:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  backdrop-filter:blur(8px);
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  border-color:#00ffcc;
  color:#00ffcc;
  box-shadow:0 0 15px rgba(0,255,200,0.4);
}

/* FORUM SECTION */
.forum{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

.category{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,200,0.2);
  border-radius:12px;
  margin-bottom:20px;
  padding:20px;
}

.category h2{
  color:#00ffcc;
}

.topic{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.footer{
  text-align:center;
  padding:20px;
  color:#00ffcc;
  border-top:1px solid rgba(0,255,200,0.2);
}

/* LOGIN POPUP */
#authBox{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#000;
  padding:20px;
  border-radius:10px;
  z-index:2000;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">NEXUS LIFE</div>
<div class="nav-links">
<a href="#">Accueil</a>
<a href="#forum">Forum</a>
<a href="#">Discord</a>
<a onclick="showAuth()">Connexion</a> <!-- MODIFIÉ -->
</div>
</div>

<div class="hero">
<div class="overlay"></div>
<div class="content">
<h1>Bienvenue sur le forum</h1>
<button class="btn">Règlement</button>
<button class="btn">Nous rejoindre</button>
<button class="btn">Discord</button>
</div>
</div>

<div id="forum" class="forum">

<div class="category">
<h2>📜 Informations</h2>
<div class="topic">Règlement du serveur</div>
<div class="topic">Annonces officielles</div>
</div>

<div class="category">
<h2>💬 Communauté</h2>
<div class="topic">Discussions générales</div>
<div class="topic">Présentation des joueurs</div>
</div>

<div class="category">
<h2>🚔 RolePlay</h2>
<div class="topic">Gendarmerie</div>
<div class="topic">Pompier</div>
<div class="topic">Dépanneur</div>
</div>

</div>

<div class="footer">
STAFF • Fondateur TOKKA & TAKKO
</div>

<!-- LOGIN -->
<div id="authBox">
<h3 style="color:#00ffcc;text-align:center;">Connexion</h3>

<input id="email" placeholder="Email" style="width:100%;margin:5px 0;padding:8px;"><br>
<input id="password" type="password" placeholder="Mot de passe" style="width:100%;margin:5px 0;padding:8px;"><br>

<button onclick="login()" style="width:100%;margin-top:10px;">Se connecter</button>

<hr style="margin:15px 0;border:0;border-top:1px solid #333;">

<button onclick="register()" style="width:100%;">Créer un compte</button>
</div>

<script>
function showAuth(){
  document.getElementById("authBox").style.display="block";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCln4tlMOg0s9CAD4QxlYNukcTCTI8ytB0",
  authDomain: "nexuslife-7a720.firebaseapp.com",
  projectId: "nexuslife-7a720"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();

// 👇 IMPORTANT : window.

window.register = () => {

  const emailInput = document.getElementById("email").value;
  const passwordInput = document.getElementById("password").value;

  if(!emailInput.includes("@") || !emailInput.includes(".")){
    alert("Email invalide !");
    return;
  }

  if(passwordInput.length < 6){
    alert("Mot de passe trop court (6 caractères minimum)");
    return;
  }

  createUserWithEmailAndPassword(auth,emailInput,passwordInput)
  .then(()=>alert("Compte créé !"))
  .catch(e=>alert(e.message));
};

window.login = () => {

  const emailInput = document.getElementById("email").value;
  const passwordInput = document.getElementById("password").value;

  signInWithEmailAndPassword(auth,emailInput,passwordInput)
  .then(()=>alert("Connecté !"))
  .catch(e=>alert(e.message));
};
</script>

</body>
</html>
